server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/sports_meeting?useUnicode=true&characterEncoding=utf8mb4&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: false

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deletedAt
      logic-delete-value: "NOW()"
      logic-not-delete-value: "NULL"
    banner: false

jwt:
  secret: sports-meeting-secret-key-2024-very-long-key-for-hs256-algorithm-must-be-at-least-256-bits
  expiration: 86400000

logging:
  level:
    com.sportsmeet: debug
